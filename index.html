<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Family Bike Map — kid-safe bike routes</title>
    <meta
      name="description"
      content="Bike routing for families with young kids. Streets colored by what's safe for your rider, and routes that walk past scary intersections rather than through them. Works in Berlin and the SF Bay Area."
    />
    <meta property="og:title" content="Family Bike Map — kid-safe bike routes" />
    <meta
      property="og:description"
      content="Bike routing for families with young kids. Streets colored by what's safe for your rider, and routes that walk past scary intersections rather than through them."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://bike-map.fryanpan.com/" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Family Bike Map — kid-safe bike routes" />
    <meta
      name="twitter:description"
      content="Bike routing for families with young kids. Streets colored by what's safe for your rider, and routes that walk past scary intersections rather than through them."
    />
    <!-- Web font — DM Sans: geometric, warm, highly readable -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Establish early connections to tile and API servers -->
    <link rel="preconnect" href="https://tile.openstreetmap.org" crossorigin />
    <link rel="dns-prefetch" href="https://a.tile.openstreetmap.org" />
    <link rel="dns-prefetch" href="https://b.tile.openstreetmap.org" />
    <link rel="dns-prefetch" href="https://c.tile.openstreetmap.org" />
    <link rel="dns-prefetch" href="https://valhalla1.openstreetmap.de" />
    <link rel="dns-prefetch" href="https://nominatim.openstreetmap.org" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- Plausible analytics — production only. Cookieless, EU-hosted, no
         consent banner needed (per privacy-preserving-web-analytics fleet
         decision 2026-05-05; see docs/product/decisions.md). Standard
         plausible.io script; if ad-blocker hit-rate ever matters, swap to
         the CF Worker proxy pattern. -->
    <script>
      (function () {
        if (location.hostname !== 'bike-map.fryanpan.com') return
        var s = document.createElement('script')
        s.defer = true
        s.setAttribute('data-domain', 'bike-map.fryanpan.com')
        s.src = 'https://plausible.io/js/script.js'
        document.head.appendChild(s)
      })()
    </script>
    <!-- Live-feedback widget — dev only. Loaded from the local feedback
         server (default :8788) and gated on localhost / Tailscale / .local
         hostnames so it never ships in production. -->
    <script>
      (function () {
        var h = location.hostname
        var isDev = h === 'localhost' || h === '127.0.0.1' || h.endsWith('.local') || /^100\./.test(h)
        if (!isDev) return
        var FB_ORIGIN = 'http://' + h + ':8788'
        var s = document.createElement('script')
        s.src = FB_ORIGIN + '/widget.iife.js'
        s.onload = function () {
          var params = new URLSearchParams(location.search)
          window.FeedbackWidget.init({
            docId: 'family-bike-map',
            user: params.get('as'),
            serverUrl: FB_ORIGIN,
          })
        }
        document.body.appendChild(s)
      })()
    </script>
  </body>
</html>
