name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build
        env:
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          VITE_USERBACK_TOKEN: ${{ secrets.VITE_USERBACK_TOKEN }}
          VITE_POSTHOG_KEY: ${{ secrets.VITE_POSTHOG_KEY }}
          VITE_POSTHOG_HOST: ${{ secrets.VITE_POSTHOG_HOST }}
          # VITE_MAPILLARY_TOKEN removed 2026-04-21. Mapillary tokens can't
          # be referrer-locked so they no longer ship in the client bundle —
          # the Worker proxies the API with a server-side MAPILLARY_TOKEN
          # secret (set via `wrangler secret put MAPILLARY_TOKEN`). Add the
          # GitHub secret below only if we want CI to push the Worker
          # secret on every deploy; the default is a one-time manual set
          # via wrangler.

      - name: Deploy to Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          secrets: |
            MAPILLARY_TOKEN
        env:
          MAPILLARY_TOKEN: ${{ secrets.MAPILLARY_TOKEN }}
