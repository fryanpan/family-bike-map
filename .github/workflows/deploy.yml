name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Cache bun's package store between runs. Without this, `bun install`
      # re-downloaded all 200 packages from the registry on every deploy,
      # costing ~12 minutes. Keyed on bun.lock — any dep change invalidates.
      - name: Cache bun packages
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build
        env:
          # Release version — vite.config.ts injects this into the bundle
          # via `define: __APP_VERSION__`, and src/{sentry,userback}.ts
          # tag every event with it. Patch = GitHub Actions run number so
          # every deploy gets a monotonic identifier traceable back to a
          # workflow run (and from there, the commit).
          VITE_APP_VERSION: "0.1.${{ github.run_number }}"
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          VITE_USERBACK_TOKEN: ${{ secrets.VITE_USERBACK_TOKEN }}
          # PostHog removed 2026-05-05 — Plausible loaded statically from
          # index.html, no build-time secret needed.
          # Map rendering engines (selectable from Admin Tools → Settings).
          # Both keys are bundled into the client and must be referrer-
          # restricted in their respective dashboards. Either can be empty —
          # the resolver falls back to OSM Carto with a console warning.
          VITE_MAPTILER_KEY: ${{ secrets.VITE_MAPTILER_KEY }}
          VITE_GOOGLE_MAPS_KEY: ${{ secrets.VITE_GOOGLE_MAPS_KEY }}
          # VITE_MAPILLARY_TOKEN removed 2026-04-21. Mapillary tokens can't
          # be referrer-locked so they no longer ship in the client bundle —
          # the Worker proxies the API with a server-side MAPILLARY_TOKEN
          # secret (set via `wrangler secret put MAPILLARY_TOKEN`). Add the
          # GitHub secret below only if we want CI to push the Worker
          # secret on every deploy; the default is a one-time manual set
          # via wrangler.

      - name: Deploy to Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # Per-deploy override: tag the Worker with the same APP_VERSION
          # the frontend bundle was built with so Sentry events from both
          # stacks share a release identifier. (--var overrides the
          # placeholder in wrangler.toml's [vars] block.)
          command: deploy --var "APP_VERSION:0.1.${{ github.run_number }}"
          secrets: |
            MAPILLARY_TOKEN
            SENTRY_DSN
        env:
          MAPILLARY_TOKEN: ${{ secrets.MAPILLARY_TOKEN }}
          # Sentry DSN reuses the same value as the frontend secret (DSNs
          # are public client-keys per Sentry docs). One Sentry project,
          # tagged by `runtime` to distinguish worker vs browser.
          SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
