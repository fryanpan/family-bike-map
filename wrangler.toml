name = "family-bike-map"
main = "src/worker.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "single-page-application"

[[routes]]
pattern = "bike-map.fryanpan.com"
custom_domain = true

# Sentry config for the Worker. Same project as the frontend — the runtime
# tag set in withSentry() distinguishes browser vs worker without splitting
# the issue list. SENTRY_DSN is the same value as the client VITE_SENTRY_DSN
# (Sentry DSNs are public client-keys, not secrets), set via:
#   wrangler secret put SENTRY_DSN
# APP_VERSION is overridden per-deploy from CI so it matches the frontend
# bundle's __APP_VERSION__.
[vars]
SENTRY_ENV = "production"
APP_VERSION = "0.0.0-local"

# CLASSIFICATION_RULES KV binding removed 2026-04-28 with /api/rules/:region.
# The Cloudflare KV namespace itself can be deleted via the Cloudflare
# dashboard once any historical data is no longer needed; leaving it
# unbound here is safe.

[[d1_databases]]
binding = "ROUTE_LOGS"
database_name = "bike-route-logs"
database_id = "0ccee590-8fea-4bf3-954e-5f02edc50a61"

[observability]
enabled = true
