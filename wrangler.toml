name = "bike-route-finder"
main = "src/worker.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "single-page-application"

[[routes]]
pattern = "bike-map.fryanpan.com"
custom_domain = true

[[kv_namespaces]]
binding = "CLASSIFICATION_RULES"
id = "TBD_CREATE_WITH_wrangler_kv_namespace_create"
preview_id = "TBD_CREATE_WITH_wrangler_kv_namespace_create_preview"

[observability]
enabled = true
